@if (!consent.hasDecided()) {
  <div class="drawer-backdrop">
    <div
      class="drawer-card"
      role="dialog"
      aria-label="Cookie consent"
      i18n-aria-label="
        @@components.cookie_consent_drawer.cookie_consent_drawer.01.aria_label"
    >
      <div class="drawer-text">
        <strong
          i18n="@@components.cookie_consent_drawer.cookie_consent_drawer.02"
          >This site uses cookies</strong
        >
        <p i18n="@@cookie-consent.body">
          Sign-in and security cookies are always active. With your consent we
          also load Google Fonts and Google Analytics.
          <a routerLink="/privacy">Privacy policy</a>
        </p>
      </div>
      <div class="drawer-actions">
        <button
          type="button"
          i18n="@@components.cookie_consent_drawer.cookie_consent_drawer.04"
          class="btn-reject"
          (click)="consent.reject()"
        >
          Reject all
        </button>
        <button
          type="button"
          i18n="@@components.cookie_consent_drawer.cookie_consent_drawer.05"
          class="btn-accept"
          (click)="consent.accept()"
        >
          Accept all
        </button>
      </div>
    </div>
  </div>
}
