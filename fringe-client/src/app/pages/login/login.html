<div class="login-page">
  <div class="login-card">
    <h1 i18n="@@pages.login.login.05" class="brand">Fringe</h1>
    <p i18n="@@pages.login.login.06" class="tagline">Group festival planner</p>

    @if (cognitoConfigured) {
      @if (step() === "email") {
        <fg-login-email-step
          [captchaToken]="captchaToken()"
          [loading]="loading()"
          [(email)]="email"
          [(agreedToTerms)]="agreedToTerms"
          (send)="sendCode()"
        />
      }

      @if (step() === "otp") {
        <fg-login-otp-step
          [email]="email()"
          [loading]="loading()"
          [(otp)]="otp"
          (verify)="verifyCode()"
          (back)="back()"
        />
      }

      @if (step() === "username") {
        <fg-login-username-step
          [loading]="loading()"
          [(username)]="username"
          (save)="saveUsername()"
        />
      }

    } @else {
      <div class="dev-panel">
        <p i18n="@@pages.login.login.12" class="dev-label">
          Dev mode — enter any user ID
        </p>
        <div class="dev-row">
          <input
            type="text"
            placeholder="user-id"
            i18n-placeholder="@@pages.login.login.04.placeholder"
            [ngModel]="devUserId()"
            (ngModelChange)="devUserId.set($event)"
            (keyup.enter)="signInDev()"
          />
          <button
            type="button"
            i18n="@@pages.login.login.13"
            class="btn-primary"
            (click)="signInDev()"
          >
            Go
          </button>
        </div>
      </div>
    }

    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }
  </div>
</div>
