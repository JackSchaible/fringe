@if (missedShows().length > 0) {
  <section class="missed-section">
    <h3 i18n="@@pages.schedule.schedule.13" class="missed-heading">
      Didn't Make the Cut
    </h3>
    @for (missed of missedShows(); track missed.show.showId) {
      <fg-missed-show-card
        [show]="missed.show"
        [conflictsWithScheduled]="missed.conflictsWithScheduled"
        [blockedByMembers]="missed.blockedByMembers"
        [transferConflict]="missed.transferConflict"
      />
    }
  </section>
}
