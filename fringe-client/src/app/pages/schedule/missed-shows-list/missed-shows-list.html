@if (missedShows().length > 0) {
  <section class="missed-section">
    <h3 i18n="@@pages.schedule.schedule.13" class="missed-heading">
      Didn't Make the Cut
    </h3>
    @for (missed of missedShows(); track missed.show.showId) {
      <div class="missed-card">
        <div class="missed-header">
          <span class="missed-title">{{ missed.show.title }}</span>
          <div class="missed-tags">
            <fg-missed-show-tags
              [conflictsWithScheduled]="missed.conflictsWithScheduled"
              [blockedByMembers]="missed.blockedByMembers"
              [hasTransferConflict]="!!missed.transferConflict"
            />
          </div>
        </div>
        @if (missed.transferConflict; as conflict) {
          <fg-transfer-conflict-detail [conflict]="conflict" />
        }
      </div>
    }
  </section>
}
