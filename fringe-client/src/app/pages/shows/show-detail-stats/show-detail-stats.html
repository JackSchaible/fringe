<div class="detail-stats">
  @if (show().lengthInMinutes) {
    <span i18n="@@shows.duration-stat" class="stat">
      <fa-icon [icon]="faClock" />
      {{ show().lengthInMinutes }} min
    </span>
  }
  @if (venueName(); as name) {
    <span class="stat">
      <fa-icon [icon]="faLocationDot" />
      {{ name }}
    </span>
  }
</div>

@if (venueAddress(); as address) {
  <p class="detail-address">{{ address }}</p>
}
