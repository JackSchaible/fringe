@if (options().length) {
  <div class="filter-group">
    @if (label()) {
      <span class="filter-label">{{ label() }}</span>
    }
    <div class="pill-row">
      @for (option of options(); track option.value) {
        <button
          type="button"
          class="pill"
          [title]="option.title ?? ''"
          [class.active]="selected().has(option.value)"
          (click)="toggled.emit(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  </div>
}
