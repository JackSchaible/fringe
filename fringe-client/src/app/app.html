@if (auth.currentUser()) {
  <nav class="nav">
    <a routerLink="/shows" class="nav-brand">Jack's Fringe Planner</a>
    <div class="nav-links">
      <a routerLink="/shows" routerLinkActive="active">
        <fa-icon [icon]="faFilm" />
        Shows
      </a>
      <a routerLink="/schedule" routerLinkActive="active">
        <fa-icon [icon]="faCalendarDays" />
        Schedule
      </a>
      <a routerLink="/group" routerLinkActive="active">
        <fa-icon [icon]="faUsers" />
        Group
      </a>
      <a routerLink="/availability" routerLinkActive="active">
        <fa-icon [icon]="faClock" />
        Availability
      </a>
    </div>
    <button class="nav-signout" (click)="auth.signOut()" title="Sign out">
      <fa-icon [icon]="faArrowRightFromBracket" />
    </button>
  </nav>
}

<main>
  <router-outlet />
</main>

<footer class="site-footer">
  <span class="footer-copy"
    >&copy; {{ year }} Cactus Studios. Independent project. Not affiliated with
    Fringe Theatre Adventures.</span
  >
  <span class="footer-sep">·</span>
  <a routerLink="/privacy">Privacy Policy</a>
  <span class="footer-sep">·</span>
  <a routerLink="/terms">Terms of Service</a>
  <span class="footer-sep">·</span>
  <a href="mailto:hello@jackschaible.ca">Contact</a>
</footer>

<fg-cookie-consent-drawer />
