@if (auth.currentUser()) {
  <nav class="nav">
    <a i18n="@@app.02" routerLink="/shows" class="nav-brand"
      >Jack's Fringe Planner</a
    >
    <div class="nav-links">
      <a i18n="@@app.nav.shows" routerLink="/shows" routerLinkActive="active">
        <fa-icon [icon]="faFilm" />
        Shows
      </a>
      <a
        i18n="@@app.nav.schedule"
        routerLink="/schedule"
        routerLinkActive="active"
      >
        <fa-icon [icon]="faCalendarDays" />
        Schedule
      </a>
      <a i18n="@@app.nav.group" routerLink="/group" routerLinkActive="active">
        <fa-icon [icon]="faUsers" />
        Group
      </a>
      <a
        i18n="@@app.nav.availability"
        routerLink="/availability"
        routerLinkActive="active"
      >
        <fa-icon [icon]="faClock" />
        Availability
      </a>
    </div>
    <button
      type="button"
      class="nav-signout"
      title="Sign out"
      i18n-title="@@app.01.title"
      (click)="auth.signOut()"
    >
      <fa-icon [icon]="faArrowRightFromBracket" />
    </button>
  </nav>
}

<main>
  <router-outlet />
</main>

<footer class="site-footer">
  <span i18n="@@app.03" class="footer-copy"
    >&copy; {{ year }} Cactus Studios. Independent project. Not affiliated with
    Fringe Theatre Adventures.</span
  >
  <span class="footer-sep">·</span>
  <a i18n="@@app.04" routerLink="/privacy">Privacy Policy</a>
  <span class="footer-sep">·</span>
  <a i18n="@@app.05" routerLink="/terms">Terms of Service</a>
  <span class="footer-sep">·</span>
  <a i18n="@@app.06" href="mailto:hello@jackschaible.ca">Contact</a>
</footer>

<fg-cookie-consent-drawer />
