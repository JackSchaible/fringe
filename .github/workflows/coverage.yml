name: Coverage

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Font Awesome auth
        run: |
          cat > fringe-client/.npmrc <<'EOF'
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_TOKEN }}
          always-auth=true
          EOF

      - name: Restore .NET packages
        run: dotnet restore fringe.sln

      - name: Build .NET with analyzers
        run: dotnet build fringe.sln --configuration Release --no-restore

      - name: Run .NET tests with coverage
        run: dotnet test fringe.sln --configuration Release --no-restore --no-build --collect:"XPlat Code Coverage" --results-directory coverage/dotnet --logger trx

      - name: Install frontend dependencies
        working-directory: fringe-client
        run: pnpm install --frozen-lockfile

      - name: Run Angular tests with coverage
        working-directory: fringe-client
        run: pnpm run test:coverage

      - name: Create CDK asset stubs
        run: |
          mkdir -p Fringe.API/publish Fringe.Scraper/publish fringe-client/dist/client-new/browser
          touch Fringe.API/publish/.gitkeep Fringe.Scraper/publish/.gitkeep fringe-client/dist/client-new/browser/.gitkeep

      - name: Install infra dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Run infra tests with coverage
        working-directory: infra
        run: pnpm run test:coverage

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate combined coverage report
        run: |
          reportgenerator \
            -reports:"coverage/dotnet/**/coverage.cobertura.xml;fringe-client/coverage/**/lcov.info;infra/coverage/lcov.info" \
            -targetdir:"coverage/report" \
            -reporttypes:"HtmlInline;Cobertura;MarkdownSummaryGithub"

      - name: Add coverage summary
        run: cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report
          if-no-files-found: error
