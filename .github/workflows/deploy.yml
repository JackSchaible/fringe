name: Deploy

on:
  push:
    branches: [main]

# OIDC requires these permissions on the workflow
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Font Awesome auth
        run: |
          cat > fringe-client/.npmrc <<'EOF'
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_TOKEN }}
          always-auth=true
          EOF

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('fringe-client/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Restore .NET packages
        run: dotnet restore fringe.sln

      - name: Verify .NET formatting and analyzers
        run: dotnet format fringe.sln --verify-no-changes --no-restore

      - name: Build .NET with analyzers
        run: dotnet build fringe.sln --no-restore --configuration Release

      - name: Run .NET tests
        run: dotnet test fringe.sln --no-restore --no-build --configuration Release

      - name: Install frontend dependencies
        working-directory: fringe-client
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        working-directory: fringe-client
        run: pnpm run lint

      - name: Run Angular tests
        working-directory: fringe-client
        run: pnpm test --watch=false --browsers=ChromeHeadless

      - name: Create CDK asset stubs
        run: |
          mkdir -p Fringe.API/publish Fringe.Scraper/publish fringe-client/dist/client-new/browser
          touch Fringe.API/publish/.gitkeep Fringe.Scraper/publish/.gitkeep fringe-client/dist/client-new/browser/.gitkeep

      - name: Install CDK dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Run CDK tests
        working-directory: infra
        run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Assumes an IAM role via OIDC — no long-lived credentials stored in secrets.
      # See SETUP.md (below) for how to create the role.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Font Awesome auth
        run: |
          cat > fringe-client/.npmrc <<'EOF'
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_TOKEN }}
          always-auth=true
          EOF

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('fringe-client/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Restore .NET packages
        run: dotnet restore fringe.sln

      - name: Publish Fringe.API
        run: dotnet publish Fringe.API -c Release -o Fringe.API/publish

      - name: Publish Fringe.Scraper
        run: dotnet publish Fringe.Scraper -c Release -o Fringe.Scraper/publish

      - name: Install frontend dependencies
        working-directory: fringe-client
        run: pnpm install --frozen-lockfile

      - name: Fetch Cognito config from existing stack
        run: |
          POOL_ID=$(aws cloudformation describe-stacks --stack-name FringeStack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" \
            --output text 2>/dev/null || true)
          CLIENT_ID=$(aws cloudformation describe-stacks --stack-name FringeStack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoClientId'].OutputValue" \
            --output text 2>/dev/null || true)
          echo "COGNITO_POOL_ID=$POOL_ID" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV

      - name: Build Angular frontend
        working-directory: fringe-client
        env:
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          sed -i "s|cognitoUserPoolId: '[^']*'|cognitoUserPoolId: '$COGNITO_POOL_ID'|" src/environments/environment.prod.ts
          sed -i "s|cognitoClientId: '[^']*'|cognitoClientId: '$COGNITO_CLIENT_ID'|" src/environments/environment.prod.ts
          sed -i "s|turnstileSiteKey: '[^']*'|turnstileSiteKey: '$TURNSTILE_SITE_KEY'|" src/environments/environment.prod.ts
          pnpm run build

      - name: Install CDK dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: CDK bootstrap
        working-directory: infra
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          pnpm exec cdk bootstrap aws://$ACCOUNT/ca-central-1 aws://$ACCOUNT/us-east-1

      - name: CDK deploy
        working-directory: infra
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: pnpm exec cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Rebuild frontend if Cognito was just created (first deploy)
        env:
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          NEW_POOL_ID=$(jq -r '.FringeStack.CognitoUserPoolId' infra/cdk-outputs.json)
          NEW_CLIENT_ID=$(jq -r '.FringeStack.CognitoClientId' infra/cdk-outputs.json)
          if [ "$NEW_POOL_ID" != "$COGNITO_POOL_ID" ] || [ "$NEW_CLIENT_ID" != "$COGNITO_CLIENT_ID" ]; then
            echo "Cognito IDs changed (first deploy) — rebuilding frontend and redeploying..."
            cd fringe-client
            sed -i "s|cognitoUserPoolId: '[^']*'|cognitoUserPoolId: '$NEW_POOL_ID'|" src/environments/environment.prod.ts
            sed -i "s|cognitoClientId: '[^']*'|cognitoClientId: '$NEW_CLIENT_ID'|" src/environments/environment.prod.ts
            sed -i "s|turnstileSiteKey: '[^']*'|turnstileSiteKey: '$TURNSTILE_SITE_KEY'|" src/environments/environment.prod.ts
            pnpm run build
            cd ../infra
            pnpm exec cdk deploy FringeStack --require-approval never
          fi

      - name: Print stack outputs
        if: always()
        working-directory: infra
        run: cat cdk-outputs.json 2>/dev/null || true
