name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Font Awesome auth
        run: |
          cat > fringe-client/.npmrc <<'EOF'
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_TOKEN }}
          always-auth=true
          EOF

      - name: Restore .NET packages
        run: dotnet restore fringe.sln

      - name: Build .NET
        run: dotnet build fringe.sln --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test fringe.sln --configuration Release --no-restore --no-build

      - name: Install frontend dependencies
        working-directory: fringe-client
        run: pnpm install --frozen-lockfile

      - name: Run Angular tests
        working-directory: fringe-client
        run: pnpm test --watch=false --browsers=ChromeHeadless

      - name: Create CDK asset stubs
        run: |
          mkdir -p Fringe.API/publish Fringe.Scraper/publish fringe-client/dist/client-new/browser
          touch Fringe.API/publish/.gitkeep Fringe.Scraper/publish/.gitkeep fringe-client/dist/client-new/browser/.gitkeep

      - name: Install infra dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Run infra tests
        working-directory: infra
        run: pnpm test
