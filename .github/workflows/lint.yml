name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Font Awesome auth
        run: |
          cat > fringe-client/.npmrc <<'EOF'
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_TOKEN }}
          always-auth=true
          EOF

      - name: Restore .NET packages
        run: dotnet restore fringe.sln

      - name: Verify .NET formatting and analyzers
        run: dotnet format fringe.sln --verify-no-changes --no-restore

      - name: Install frontend dependencies
        working-directory: fringe-client
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        working-directory: fringe-client
        run: pnpm run lint
